name: Daily Playwright Tests
on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST daily (9:45 AM UTC)
  workflow_dispatch:     # Manual trigger option
jobs:
  playwright-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spec: ['tests/example.spec.ts', 'tests/checkout.spec.ts']  # Your 2 specs
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test ${{ matrix.spec }} --reporter=blob
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: blob-report-${{ matrix.spec }}
        path: blob-report
        retention-days: 7

  